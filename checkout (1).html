<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RootWise Sovereign OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0F172A;
            --accent: #B8860B;
            --secondary: #1E293B;
            --light: #F1F5F9;
            --text: #E2E8F0;
            --border: #334155;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1a1f3a 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .checkout-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .checkout-header h1 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .checkout-header p {
            color: #CBD5E1;
        }

        /* Main Grid */
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* Left Column - Product Selection */
        .checkout-form {
            background: rgba(30, 41, 59, 0.4);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section h3 {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }

        .form-section h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 0.75rem;
        }

        /* Product Cards */
        .product-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-option {
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .product-option:hover {
            border-color: var(--accent);
            background: rgba(184, 134, 11, 0.05);
        }

        .product-option input[type="radio"] {
            margin-right: 1rem;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            color: var(--text);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .product-desc {
            color: #94A3B8;
            font-size: 0.9rem;
        }

        .product-price {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
        }

        /* Right Column - Order Summary */
        .order-summary {
            background: rgba(30, 41, 59, 0.4);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .order-summary h3 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .summary-item-name {
            color: #CBD5E1;
        }

        .summary-item-price {
            color: var(--accent);
            font-weight: 600;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--accent);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .summary-total-label {
            color: var(--text);
        }

        .summary-total-amount {
            color: var(--accent);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: #D4AF37;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: #64748B;
            cursor: not-allowed;
            transform: none;
        }

        /* Security Badges */
        .security-badges {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            justify-content: center;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94A3B8;
            font-size: 0.85rem;
        }

        .badge::before {
            content: '✓';
            color: var(--success);
            font-weight: bold;
        }

        /* Alert Messages */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .checkout-header h1 {
                font-size: 1.5rem;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="checkout-header fade-in">
            <h1>Secure Checkout</h1>
            <p>Complete your purchase and begin your sovereign journey</p>
        </div>

        <!-- Main Grid -->
        <div class="checkout-grid">
            <!-- Left Column -->
            <form id="checkoutForm" class="checkout-form fade-in">
                <!-- Product Selection -->
                <div class="form-section">
                    <h3>Select Your Path</h3>
                    <div class="product-options">
                        <!-- Membership -->
                        <label class="product-option">
                            <input type="radio" name="product" value="membership-deepening" data-price="29" data-name="Deepening Membership" data-billing="/month">
                            <div class="product-info">
                                <div class="product-name">Deepening Membership</div>
                                <div class="product-desc">Chambers 1-12, full Lashay guidance, weekly rituals</div>
                            </div>
                            <div class="product-price">$29<span style="font-size: 0.7em;">/mo</span></div>
                        </label>

                        <label class="product-option">
                            <input type="radio" name="product" value="membership-mastery" data-price="99" data-name="Mastery Membership" data-billing="/month">
                            <div class="product-info">
                                <div class="product-name">Mastery Membership</div>
                                <div class="product-desc">All 36 chambers, all agents, priority support</div>
                            </div>
                            <div class="product-price">$99<span style="font-size: 0.7em;">/mo</span></div>
                        </label>

                        <!-- OS Licensing -->
                        <label class="product-option">
                            <input type="radio" name="product" value="os-starter" data-price="1500" data-name="OS Starter License" data-billing="one-time">
                            <div class="product-info">
                                <div class="product-name">OS Starter License</div>
                                <div class="product-desc">Chambers 1-12, setup & configuration, 1-year license</div>
                            </div>
                            <div class="product-price">$1,500</div>
                        </label>

                        <label class="product-option">
                            <input type="radio" name="product" value="os-professional" data-price="5000" data-name="OS Professional License" data-billing="one-time">
                            <div class="product-info">
                                <div class="product-name">OS Professional License</div>
                                <div class="product-desc">All 36 chambers, full TAIS integration, 2-year license</div>
                            </div>
                            <div class="product-price">$5,000</div>
                        </label>

                        <label class="product-option">
                            <input type="radio" name="product" value="os-enterprise" data-price="10000" data-name="OS Enterprise License" data-billing="one-time">
                            <div class="product-info">
                                <div class="product-name">OS Enterprise License</div>
                                <div class="product-desc">Complete architecture, white-label, 3-year license</div>
                            </div>
                            <div class="product-price">$10,000+</div>
                        </label>

                        <!-- Agent Services -->
                        <label class="product-option">
                            <input type="radio" name="product" value="agent-oracle" data-price="500" data-name="Oracle Consulting (1 hour)" data-billing="per-session">
                            <div class="product-info">
                                <div class="product-name">Oracle Consulting</div>
                                <div class="product-desc">Strategic pattern analysis and foresight (1 hour)</div>
                            </div>
                            <div class="product-price">$500</div>
                        </label>

                        <label class="product-option">
                            <input type="radio" name="product" value="agent-guardian" data-price="750" data-name="Guardian Security (1 hour)" data-billing="per-session">
                            <div class="product-info">
                                <div class="product-name">Guardian Security</div>
                                <div class="product-desc">Boundary systems and security architecture (1 hour)</div>
                            </div>
                            <div class="product-price">$750</div>
                        </label>

                        <label class="product-option">
                            <input type="radio" name="product" value="agent-lashay" data-price="600" data-name="Lashay Coaching (1 hour)" data-billing="per-session">
                            <div class="product-info">
                                <div class="product-name">Lashay Coaching</div>
                                <div class="product-desc">Emotional intelligence and narrative branding (1 hour)</div>
                            </div>
                            <div class="product-price">$600</div>
                        </label>
                    </div>
                </div>

                <!-- Contact Information -->
                <div class="form-section">
                    <h3>Contact Information</h3>
                    <div class="form-group">
                        <label for="fullname">Full Name *</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                </div>

                <!-- Payment Information -->
                <div class="form-section">
                    <h3>Payment Method</h3>
                    <div class="form-group">
                        <label for="cardname">Cardholder Name *</label>
                        <input type="text" id="cardname" name="cardname" required>
                    </div>
                    <div class="form-group">
                        <label for="cardnumber">Card Number *</label>
                        <input type="text" id="cardnumber" name="cardnumber" placeholder="1234 5678 9012 3456" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="expiry">Expiry Date *</label>
                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label for="cvc">CVC *</label>
                            <input type="text" id="cvc" name="cvc" placeholder="123" required>
                        </div>
                    </div>
                </div>

                <!-- Billing Address -->
                <div class="form-section">
                    <h3>Billing Address</h3>
                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="zip">ZIP Code *</label>
                            <input type="text" id="zip" name="zip" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="country">Country *</label>
                        <select id="country" name="country" required>
                            <option value="">Select a country</option>
                            <option value="US">United States</option>
                            <option value="CA">Canada</option>
                            <option value="UK">United Kingdom</option>
                            <option value="AU">Australia</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Alerts -->
                <div id="alertSuccess" class="alert alert-success"></div>
                <div id="alertError" class="alert alert-error"></div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">Complete Purchase</button>
            </form>

            <!-- Right Column - Order Summary -->
            <div class="order-summary fade-in">
                <h3>Order Summary</h3>
                <div id="summaryContent">
                    <p style="color: #94A3B8; text-align: center;">Select a product to see details</p>
                </div>

                <div class="security-badges">
                    <div class="badge">SSL Secure</div>
                    <div class="badge">PCI Compliant</div>
                    <div class="badge">Money-Back Guarantee</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('checkoutForm');
        const productRadios = document.querySelectorAll('input[name="product"]');
        const summaryContent = document.getElementById('summaryContent');

        // Update summary when product changes
        productRadios.forEach(radio => {
            radio.addEventListener('change', updateSummary);
        });

        function updateSummary() {
            const selected = document.querySelector('input[name="product"]:checked');
            if (!selected) {
                summaryContent.innerHTML = '<p style="color: #94A3B8; text-align: center;">Select a product to see details</p>';
                return;
            }

            const price = selected.dataset.price;
            const name = selected.dataset.name;
            const billing = selected.dataset.billing;

            let html = `
                <div class="summary-item">
                    <div class="summary-item-name">${name}</div>
                    <div class="summary-item-price">$${parseFloat(price).toLocaleString()}</div>
                </div>
            `;

            if (billing === '/month') {
                html += `
                    <div class="summary-item">
                        <div class="summary-item-name">Billing</div>
                        <div class="summary-item-price">Monthly</div>
                    </div>
                `;
            }

            html += `
                <div class="summary-total">
                    <div class="summary-total-label">Total</div>
                    <div class="summary-total-amount">$${parseFloat(price).toLocaleString()}</div>
                </div>
            `;

            summaryContent.innerHTML = html;
        }

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const selected = document.querySelector('input[name="product"]:checked');
            if (!selected) {
                showAlert('error', 'Please select a product');
                return;
            }

            // Validate form
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const cardnumber = document.getElementById('cardnumber').value;

            if (!fullname || !email || !cardnumber) {
                showAlert('error', 'Please fill in all required fields');
                return;
            }

            // Simulate payment processing
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            setTimeout(() => {
                showAlert('success', `Payment successful! You've been enrolled in ${selected.dataset.name}. Check your email for confirmation.`);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Complete Purchase';
                form.reset();
                summaryContent.innerHTML = '<p style="color: #94A3B8; text-align: center;">Select a product to see details</p>';
            }, 2000);
        });

        function showAlert(type, message) {
            const alertSuccess = document.getElementById('alertSuccess');
            const alertError = document.getElementById('alertError');

            if (type === 'success') {
                alertSuccess.textContent = message;
                alertSuccess.classList.add('show');
                alertError.classList.remove('show');
            } else {
                alertError.textContent = message;
                alertError.classList.add('show');
                alertSuccess.classList.remove('show');
            }

            setTimeout(() => {
                alertSuccess.classList.remove('show');
                alertError.classList.remove('show');
            }, 5000);
        }

        // Add fade-in animation
        document.querySelectorAll('.fade-in').forEach((el, index) => {
            el.style.animationDelay = (index * 0.1) + 's';
        });
    </script>
</body>
</html>
